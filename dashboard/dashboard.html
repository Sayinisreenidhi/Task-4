<!DOCTYPE html>
<html>
<head>
<title>Superstore Sales Dashboard</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#6a5acd,#8a2be2);
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:white;
}

.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:30px;
}

.card{
    width:180px;
    padding:20px;
    border-radius:10px;
    text-align:center;
    color:white;
    font-weight:bold;
    box-shadow:0 4px 8px rgba(0,0,0,0.3);
}

.sales{background:#00e64d;}
.profit{background:#2d5bff;}
.orders{background:#ff6600;}

.charts{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.chart{
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.chart img{
    width:100%;
}

.footer{
    text-align:center;
    color:white;
    margin-top:20px;
}
</style>

</head>

<body>

<h1>📊 Superstore Sales Dashboard</h1>

<div class="cards">
    <div class="card sales">
        <h3>Total Sales</h3>
        <h2>$2.30M</h2>
    </div>

    <div class="card profit">
        <h3>Total Profit</h3>
        <h2>$286K</h2>
    </div>

    <div class="card orders">
        <h3>Total Orders</h3>
        <h2>5009</h2>
    </div>
</div>

<div class="charts">

<div class="chart">
<h3>Sales by Category</h3>
<img src="../charts/sales_by_category.png">
</div>

<div class="chart">
<h3>Sales by Region</h3>
<img src="../charts/sales_by_region.png">
</div>

<div class="chart">
<h3>Profit Distribution</h3>
<img src="../charts/profit_by_category.png">
</div>

</div>

<div class="footer">
Created using Python • SQL • Jupyter Notebook
</div>

</body>
</html>
